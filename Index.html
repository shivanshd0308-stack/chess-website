<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shivansh Chess Engine</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.css">

<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

#board{
width:500px;
margin:auto;
}

button{
padding:10px 20px;
margin:10px;
font-size:18px;
}
</style>
</head>

<body>

<h1>♔ Shivansh Chess Engine ♚</h1>

<div id="board"></div>

<button onclick="newGame()">New Game</button>

<p id="status"></p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.js"></script>

<script>
var game = new Chess();

var board = Chessboard('board',{
draggable:true,
position:'start',
onDrop:onDrop
});

function onDrop(source,target){

var move = game.move({
from:source,
to:target,
promotion:'q'
});

if(move===null) return 'snapback';

window.setTimeout(makeEngineMove,250);
}

function makeEngineMove(){

var moves = game.moves();

if(moves.length===0){
document.getElementById("status").innerHTML="Game Over";
return;
}

var bestMove = moves[Math.floor(Math.random()*moves.length)];

game.move(bestMove);

board.position(game.fen());
}

function newGame(){
game.reset();
board.start();
}
</script>

</body>
</html>function newGame(){
    game = new Chess();
    board.position('start');
}<button onclick="newGame()">New Game</button>
